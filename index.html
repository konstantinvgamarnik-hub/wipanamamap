function mapRow(r) {
    return {
        id: r.id, name: r.name, status: r.status,
        location: { district: r.district, city: r.city, country: r.country },
        coordinates: [Number(r.lng), Number(r.lat)],
        coverImage: r.cover_image || null, investmentThesis: r.investment_thesis || '',
        delivery: r.delivery || { type: 'single', date: null, phases: null },
        units: r.units || [], priceRange: { min: r.price_min, max: r.price_max, currency: r.currency || 'USD' },
        constructionProgress: r.construction_progress || null, description: r.description || '',
        highlights: r.highlights || [], investmentProfile: r.investment_profile || {}, ctaUrl: r.cta_url || '#'
    };
}
async function loadProjects() {
    const notConfigured = !SUPABASE_URL || SUPABASE_URL.indexOf('ВАШ_') !== -1 || !SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.indexOf('ВАШ_') !== -1;
    if (notConfigured) { projects = FALLBACK_PROJECTS; renderProjectMarkers(); return; }
    try {
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 8000);
        const url = SUPABASE_URL.replace(/\/+$/, '') + '/rest/v1/projects?select=*&is_published=eq.true&order=sort_order.asc';
        const res = await fetch(url, { headers: { apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY }, signal: ctrl.signal });
        clearTimeout(timer);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const rows = await res.json();
        projects = (Array.isArray(rows) && rows.length) ? rows.map(mapRow) : FALLBACK_PROJECTS;
    } catch (e) {
        console.warn('[WhiteIndex] Supabase fetch failed, using demo data:', e);
        projects = FALLBACK_PROJECTS;
    }
    renderProjectMarkers();
}

        map.addLayer({ 'id': runtimeLayerId, 'type': layerType, 'source': 'mapbox-global-streets', 'source-layer': sourceLayer, 'filter': filterExpression, 'paint': paintConfig });

    }

function toggleDynamicHillshade(isVisible) {
    const layerId = 'runtime-hillshade'; const sourceId = 'runtime-hillshade-source';
    if (!isVisible) { if (map.getLayer(layerId)) map.removeLayer(layerId); if (map.getSource(sourceId)) map.removeSource(sourceId); return; }

    map.addSource(sourceId, { 'type': 'raster-dem', 'url': 'mapbox://mapbox.mapbox-terrain-dem-v1', 'tileSize': 512 });
    map.addLayer({ 'id': layerId, 'type': 'hillshade', 'source': sourceId, 'paint': { 'hillshade-shadow-color': '#000000', 'hillshade-exaggeration': 0.6 } });

mapContainer.addEventListener('mousedown', (e) => { e.stopPropagation(); map.scrollZoom.enable(); mapContainer.classList.add('is-active'); });
